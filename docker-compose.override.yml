# Development overrides — applied automatically alongside docker-compose.yml.
# Enables hot reload, mounted source, and debugger ports.

services:
  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    volumes:
      - ./src/backend:/src
    command: ["dotnet", "watch", "run", "--project", "/src", "--urls", "http://+:8080"]
    ports:
      - "5000:8080"
      - "5005:5005"  # debugger

  frontend:
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "3000:5173"

  postgres:
    ports:
      - "5432:5432"
